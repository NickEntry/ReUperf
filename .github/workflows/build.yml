name: Build Thread Scheduler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # ✅ 关键点：使用 Ubuntu 24.04，自带 GCC 13 和 C++20 支持
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean workspace
      run: |
        rm -rf build/ CMakeCache.txt CMakeFiles/
        mkdir -p build

    # ✅ 关键点：简化的依赖安装，只安装必要的库
    # Ubuntu 24.04 默认已有 GCC 13，无需手动安装编译器
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build libjsoncpp-dev

    # ✅ 关键点：配置 CMake，明确指定 C++ 标准
    - name: Configure CMake
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=20 \
          -DCMAKE_CXX_STANDARD_REQUIRED=ON \
          -GNinja

    # ✅ 关键点：执行构建
    - name: Build with verbose output
      run: |
        cmake --build build --config Release --verbose

