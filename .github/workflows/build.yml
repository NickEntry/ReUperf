name: Build Thread Scheduler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean build directory
      run: |
        rm -rf build/
        mkdir -p build/

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          make \
          g++ \
          clang \
          lld \
          libnlohmann-json-dev

    - name: Configure CMake
      run: |
        cd build
        cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

    - name: Build project
      run: |
        cd build
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: thread-scheduler
        path: build/thread-scheduler  # 替换为你的可执行文件名

