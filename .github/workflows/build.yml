name: Build Thread Scheduler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean and force reconfigure
      run: |
        rm -rf build/ CMakeCache.txt CMakeFiles/
        mkdir -p build

    - name: Install minimal dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          make \
          g++ \
          nlohmann-json3-dev \  # 修复：Ubuntu 22.04 正确包名
          libc6-dev \
          libstdc++-dev

    - name: Configure CMake (force non-Termux)
      run: |
        cd build
        cmake .. \
          -DCMAKE_C_COMPILER=gcc \
          -DCMAKE_CXX_COMPILER=g++ \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_STATIC=OFF \  # 避免 Termux 特有静态链接逻辑
          -DCMAKE_DISABLE_FIND_PACKAGE_Termux=ON  # 关键：强制禁用 Termux 特判

    - name: Build with verbose output
      run: |
        cd build
        make VERBOSE=1  # 强制输出详细编译日志

