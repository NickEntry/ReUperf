name: Build Thread Scheduler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean build directory
      run: |
        rm -rf build/
        mkdir -p build/

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake make g++ clang libnlohmann-json-dev

    - name: Configure CMake
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      run: |
        cd build
        make -j$(nproc)

    - name: Run tests
      run: |
        cd build
        if [ -f "./thread_scheduler" ]; then
          echo "✅ Build successful, executable size:"
          ls -lh ./thread_scheduler
        else
          echo "❌ Build failed: executable not found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: thread_scheduler_binary
        path: build/thread_scheduler
        retention-days: 7

